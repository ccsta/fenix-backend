# Diz para o H2 salvar os dados num arquivo físico chamado "bancodafenix" na pasta do projeto
spring.datasource.url=jdbc:h2:file:./bancodafenix
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Diz para o Spring atualizar o banco sem apagar os dados antigos quando reiniciar
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Libera o console do H2 pra você ver o banco no navegador (opcional, mas bom ter)
spring.h2.console.enabled=true